name: Deploy tomcat Java application

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 1.8
      uses: actions/setup-java@v1
      with:
        java-version: '1.8'
    - name: Java Version 
      run: java -version
    - name: Build with Maven
      run: mvn package
    - name: deploy tomcat app
      run: curl -v -u admin:admin -T /home/runner/work/spring3-mvc-maven-xml-hello-world/target/spring3-mvc-maven-xml-hello-world-1.4.war 'http://ec2-13-239-30-214.ap-southeast-2.compute.amazonaws.com:8081/manager/text/deploy?path=/sprinapp2&update=true'
